reviews:
  - author: Patrik
    text: "Páni Elegáni is unlike anything I’ve experienced before—I found it by chance and since then I trust no one else with my haircut. It combines comfort with results. Lovely, fragrant space, always a smile, a communicative barber with a professional and human approach. She advises not only on the right cut but also on hair and skin care. I’m happy to go back with my kids and always leave satisfied and feeling fresh."
    stars: 5
    date: "a year ago"
  - author: Lukáš
    text: "Monika’s skill with scissors is extraordinary and I always leave with a stylish cut that matches my vibe. Monika is not only a great barber but also great company. Highly recommend!"
    stars: 5
    date: "a year ago"
  - author: Lukas
    text: "I always leave Páni Elegáni more than satisfied! You can feel Monika’s real passion for the craft and she nails every detail. I warmly recommend this barbershop to anyone looking for top‑tier service and exceptional care."
    stars: 5
    date: "a year ago"
  - author: Dana
    text: "I come regularly with my son and he’s very happy—he looks forward to haircuts, which used to be hard. Great approach, willingness, skill—top barber. Fully recommend."
    stars: 5
    date: "a year ago"
  - author: botkes
    text: "After one older lady who cut my hair until military service, this is the best thing I’ve had in 23 years… hats off."
    stars: 5
    date: "4 months ago"
